version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-streetlight-backend
    ports:
      - "8000:8000"
    # Load environment variables from the .env file in the web_server directory
    env_file:
      - ./web_server/.env
    environment:
      # If these are not provided in .env, Docker will attempt to pull them from the host
      - PORT=8000
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: always
